<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Guess The Car Bot</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <!-- CSS personnalisé -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h4 class="text-white">🏎️ Admin Panel</h4>
                        <hr class="bg-white opacity-25">
                        <!-- Indicateur de statut serveur -->
                        <div id="server-status" class="text-center">
                            <i class="bi bi-wifi"></i>
                            <span class="text-white-50">Vérification...</span>
                        </div>
                    </div>

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" data-tab="dashboard">
                                <i class="bi bi-speedometer2"></i> Tableau de bord
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="models">
                                <i class="bi bi-car-front"></i> Modèles
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="brands">
                                <i class="bi bi-bookmark"></i> Marques
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="players">
                                <i class="bi bi-people"></i> Joueurs
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="games">
                                <i class="bi bi-controller"></i> Parties
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-tab="system">
                                <i class="bi bi-gear"></i> Système
                            </a>
                        </li>
                    </ul>

                    <hr class="bg-white opacity-25 my-4">

                    <div class="text-center">
                        <small class="text-white-50">Version 2.0.0</small>
                        <br>
                        <small class="text-white-50" id="app-status">Chargement...</small>
                    </div>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 content-area">
                <!-- Loading spinner -->
                <div class="loading text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Chargement...</span>
                    </div>
                    <div class="mt-3">Initialisation de l'interface...</div>
                </div>

                <!-- Content will be loaded here -->
                <div id="main-content">
                    <!-- Dynamic content -->
                </div>
            </main>
        </div>
    </div>

    <!-- Alert container -->
    <div id="alert-container" style="position: fixed; top: 20px; right: 20px; z-index: 1050; min-width: 300px;">
        <!-- Alerts apparaîtront ici -->
    </div>

    <!-- Modal container -->
    <div id="modal-container" class="modal fade" tabindex="-1" aria-hidden="true">
        <!-- Modales dynamiques -->
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    <!-- Configuration et modules de base -->
    <script src="js/core/config.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/notifications.js"></script>

    <!-- Modules UI -->
    <script src="js/ui/navigation.js"></script>
    <script src="js/ui/dashboard.js"></script>
    <script src="js/ui/models.js"></script>
    <script src="js/ui/brands.js"></script>
    <script src="js/ui/players.js"></script>
    <script src="js/ui/games.js"></script>
    <script src="js/ui/system.js"></script>

    <!-- Application principale -->
    <script src="js/app.js"></script>

    <script>
        // Mise à jour du statut de l'application
        document.addEventListener('DOMContentLoaded', () => {
            const statusElement = document.getElementById('app-status');
            if (statusElement) {
                statusElement.textContent = 'Chargé';
            }
        });
    </script>
</body>

</html>
